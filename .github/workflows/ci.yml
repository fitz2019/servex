name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: '1.26.1'

jobs:
  # ── 代码质量检查 ────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: go vet
        run: go vet ./...
      - name: gofmt check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "::error::Code not formatted. Run gofmt -w -s ."
            gofmt -l .
            exit 1
          fi

  # ── 依赖检查 ────────────────────────────────────
  deps:
    name: Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Check go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod/go.sum not tidy" && exit 1)
      - name: Vulnerability check
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || echo "::warning::Vulnerabilities found, see above"

  # ── 单元测试 ────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run unit tests
        run: go test -short -race -count=1 -coverprofile=coverage-unit.out ./...
      - name: Check coverage threshold
        run: |
          total=$(go tool cover -func=coverage-unit.out | tail -1 | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${total}%"
          threshold=60
          if [ "$(echo "$total < $threshold" | bc)" = "1" ]; then
            echo "::error::Coverage ${total}% is below threshold ${threshold}%"
            exit 1
          fi
      - name: Upload unit coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit.out

  # ── 集成测试 ────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: servex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
      elasticsearch:
        image: elasticsearch:8.17.4
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Wait for services
        run: |
          echo "Waiting for Redis..."
          for i in $(seq 1 30); do
            nc -z localhost 6379 && break || sleep 1
          done
          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 30); do
            nc -z localhost 5432 && break || sleep 1
          done
          echo "Waiting for MongoDB..."
          for i in $(seq 1 30); do
            nc -z localhost 27017 && break || sleep 1
          done
          echo "Waiting for Elasticsearch..."
          for i in $(seq 1 60); do
            curl -sf http://localhost:9200/_cluster/health && break || sleep 2
          done
          echo "Services ready."
      - name: Run integration tests
        env:
          REDIS_ADDR: localhost:6379
          POSTGRES_DSN: "host=localhost port=5432 user=test password=test dbname=servex_test sslmode=disable"
          MONGO_URI: mongodb://localhost:27017
          ES_ADDRESSES: http://localhost:9200
        run: go test -race -count=1 -coverprofile=coverage-integration.out -tags=integration ./tests/integration/...
      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration.out

  # ── 覆盖率合并上报 ────────────────────────────────────
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true
      - name: Merge coverage
        run: |
          go install github.com/wadey/gocovmerge@latest
          gocovmerge coverage-unit.out coverage-integration.out > coverage.out
          echo "=== Coverage Summary ==="
          go tool cover -func=coverage.out | tail -1
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── 跨平台构建 ────────────────────────────────────
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...

  # ── 最终状态 ────────────────────────────────────
  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint, deps, test-unit, test-integration, build]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test-unit.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "::error::One or more required CI jobs failed"
            exit 1
          fi
          if [ "${{ needs.test-integration.result }}" != "success" ]; then
            echo "::warning::Integration tests failed (non-blocking)"
          fi
          if [ "${{ needs.deps.result }}" != "success" ]; then
            echo "::warning::Dependency check had issues (non-blocking)"
          fi
          echo "All required CI checks passed"
