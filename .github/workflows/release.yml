name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
      - name: Run tests
        run: go test -short -race ./...
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
