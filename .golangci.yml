version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - misspell
    - gofmt
    - bodyclose
    - noctx
  disable:
    - depguard

settings:
  govet:
    disable:
      - shadow
      - fieldalignment
  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - noctx
    - path: \.pb\.go
      linters:
        - all
  max-issues-per-linter: 0
  max-same-issues: 0
